name: Nexova POS CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev, 'feature/**' ]
  pull_request:
    branches: [ main, master ]

jobs:
  node-tests:
    name: Node.js Lint & Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Syntax & Lint Checks
        run: npm run lint || true

      - name: Run Test Suite (Unit, DB, Backups)
        run: npm test

  android-build:
    name: Android Kotlin Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew || true
        working-directory: android

      - name: Compile Kotlin and Java Source Files
        run: ./gradlew compileDebugKotlin
        working-directory: android
