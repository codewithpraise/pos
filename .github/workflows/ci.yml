name: Valenixia POS CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev, 'feature/**' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  actions: read

jobs:
  node-tests:
    name: Node.js Lint & Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Scan for committed secrets
        run: |
          echo "=== Scanning codebase for raw API keys, passwords, and private keys ==="
          SECRETS=$(git grep -E "((jwt_secret|jwtSecret|password|passphrase|private_key|privateKey|api_key|apiKey)\s*[:=]\s*['\"][a-zA-Z0-9_-]{16,}['\"]|-----BEGIN [A-Z ]*PRIVATE KEY-----)" -- ':(exclude).env.example' ':(exclude)package-lock.json' ':(exclude)scripts/license-provisioner.js' ':(exclude)tests/' || true)
          if [ ! -z "$SECRETS" ]; then
            echo "ERROR: Potential raw secrets or keys found in code commits:"
            echo "$SECRETS"
            exit 1
          fi
          echo "Secret scan passed."

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Syntax Check (Fail Fast)
        run: npm run test:syntax

      - name: Security Audit
        run: npm audit --audit-level=moderate --production

      - name: Run Test Suite (Unit, DB, Backups)
        run: npm test

      - name: Run Full E2E & Diagnostic Suites with Headless Services
        run: |
          # Clean up any existing database files to prevent test contamination
          rm -f valenixia.db valenixia.db-wal valenixia.db-shm nexova.db nexova.db-wal nexova.db-shm || true
          # Start Valenixia Server in background
          PORT=3000 node server.js > server.log 2>&1 &
          SERVER_PID=$!

          # Start Headless Chrome for Chrome DevTools Protocol
          google-chrome --headless --remote-debugging-port=9222 --disable-gpu --no-sandbox http://localhost:3000 > chrome.log 2>&1 &
          CHROME_PID=$!

          # Wait for both services to become ready
          READY=false
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null && curl -s http://localhost:9222/json > /dev/null; then
              echo "Services are ready!"
              READY=true
              break
            fi
            echo "Waiting for local server and chrome (attempt $i/30)..."
            sleep 1
          done

          if [ "$READY" = "false" ]; then
            echo "Error: Services failed to start within timeout."
            echo "=== SERVER LOG ==="
            cat server.log || true
            echo "=== CHROME LOG ==="
            cat chrome.log || true
            exit 1
          fi

          # Execute E2E test suites
          npm run test:e2e
          TEST_EXIT_CODE=$?

          # Clean up background services
          kill $SERVER_PID || true
          kill $CHROME_PID || true

          exit $TEST_EXIT_CODE

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: headless-test-diagnostics
          path: |
            server.log
            chrome.log
            public/proofs/
            tests/results/
          if-no-files-found: ignore

  android-build:
    name: Android Kotlin Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup JDK 17
        uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b # v4.5.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew
        working-directory: android

      - name: Compile Kotlin and Java Source Files
        run: ./gradlew compileDebugKotlin --no-daemon
        working-directory: android

      - name: Verify Android Asset Sync (P3-57)
        run: |
          echo "=== Verifying public/ → android/app/src/main/assets/ sync ==="
          CRITICAL_FILES="app.js index.html style.css sw.js manifest.json sync-worker.js client-db.js freemium-engine.js"
          FAILED=0
          for f in $CRITICAL_FILES; do
            PUB="public/$f"
            ANDROID="android/app/src/main/assets/$f"
            if [ ! -f "$PUB" ]; then
              echo "SKIP: $PUB not found in public/ (may be optional)"
              continue
            fi
            if [ ! -f "$ANDROID" ]; then
              echo "FAIL: $ANDROID missing from Android assets!"
              FAILED=1
              continue
            fi
            PUB_HASH=$(sha256sum "$PUB" | awk '{print $1}')
            AND_HASH=$(sha256sum "$ANDROID" | awk '{print $1}')
            if [ "$PUB_HASH" != "$AND_HASH" ]; then
              echo "FAIL: $f is out of sync (public vs android assets differ)"
              echo "  public hash:  $PUB_HASH"
              echo "  android hash: $AND_HASH"
              FAILED=1
            else
              echo "OK:   $f is in sync"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "ERROR: Android assets are out of sync with public/."
            echo "Run 'npm run sync:android' locally and commit the updated assets."
            exit 1
          fi
          echo "All critical assets are in sync."
        working-directory: .

  android-e2e:
    name: Android Emulated E2E Verification
    runs-on: ubuntu-latest
    needs: [node-tests, android-build]

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup JDK 17
        uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b # v4.5.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew
        working-directory: android

      - name: Create AVD directory
        run: mkdir -p ~/.android/avd

      - name: Install Android Emulator and Run E2E Target
        uses: ReactiveCircus/android-emulator-runner@v2.30.0
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-boot-timeout: 900
          script: |
            echo "Device initialized! Boot completed."
            cd android && ./gradlew assembleDebug
            echo "Debug APK built successfully."
