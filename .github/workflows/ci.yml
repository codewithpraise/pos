name: Nexova POS CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev, 'feature/**' ]
  pull_request:
    branches: [ main, master ]

jobs:
  node-tests:
    name: Node.js Lint & Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Syntax Check (Fail Fast)
        run: npm run test:syntax

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Run Test Suite (Unit, DB, Backups)
        run: npm test

      - name: Start Nexova POS Server
        run: node server.js &
        env:
          PORT: 3000

      - name: Start Headless Chrome for CDP
        run: google-chrome --headless --remote-debugging-port=9222 --disable-gpu --no-sandbox http://localhost:3000 &

      - name: Wait for Services to be Ready
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:3000 > /dev/null && curl -s http://localhost:9222/json > /dev/null; then
              echo "Services are ready!"
              break
            fi
            echo "Waiting for local server and chrome..."
            sleep 1
          done

      - name: Run Full E2E & Diagnostic Suites
        run: npm run test:e2e

  android-build:
    name: Android Kotlin Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew
        working-directory: android

      - name: Compile Kotlin and Java Source Files
        run: ./gradlew compileDebugKotlin --no-daemon
        working-directory: android
